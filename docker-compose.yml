services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: gtek-fsm-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SA_PASSWORD}
      MSSQL_PID: "Developer"
    ports:
      - "${SQL_SERVER_PORT}:1433"
    volumes:
      - gtek-fsm-sql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped
    networks:
      - gtek-fsm-net

  backend-api:
    image: ${BACKEND_API_IMAGE:-gtek-fsm-backend-api:local}
    build:
      context: .
      dockerfile: backend/api/Dockerfile
    container_name: gtek-fsm-backend-api
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: http://+:8080
      Database__ConnectionString: Server=sqlserver,1433;Database=${SQL_DATABASE};User Id=sa;Password=${SA_PASSWORD};Encrypt=true;TrustServerCertificate=true;
    ports:
      - "${API_PORT}:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - gtek-fsm-net

networks:
  gtek-fsm-net:
    driver: bridge

volumes:
  gtek-fsm-sql-data:
    name: gtek-fsm-sql-data
